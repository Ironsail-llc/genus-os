id: devops-report-pipeline
name: Dev Team Operations Report Pipeline
description: Weekly — collect JIRA/GitHub data deterministically, then analyze and deliver report
version: "2026-04-09"

triggers:
  - type: cron
    cron: "0 9 * * 1"  # Monday 9am ET
    timezone: America/New_York
  - type: manual

timeout_seconds: 1800

steps:
  - id: collect-jira
    type: tool
    tool_name: exec
    tool_args:
      command: "cd ~/robothor && venv/bin/python scripts/devops_collect_jira.py"
      timeout: 60
    on_failure: abort

  - id: collect-github
    type: tool
    tool_name: exec
    tool_args:
      command: "cd ~/robothor && venv/bin/python scripts/devops_collect_github.py"
      timeout: 120
    on_failure: abort

  - id: analyze
    type: agent
    agent_id: devops-manager
    message: >
      Weekly report run. Data has been pre-collected for you:
      - JIRA data: /tmp/devops_jira_data.json
      - GitHub data: /tmp/devops_github_data.json

      Execute the full report pipeline:
      1. Read both data files with read_file
      2. Resolve team identities via resolve_identities to cross-reference JIRA assignees with GitHub authors
      3. Build the report_data structure and call render_devops_report
      4. Read devops_report_recipients memory block and email the HTML report to EACH stakeholder via gws_gmail_send with content_type html
      5. Write the full report data to devops_latest_report memory block
      6. Append a dated summary to devops_report_history memory block
      7. Your final response is the Telegram summary — keep it concise and actionable
    on_failure: abort
